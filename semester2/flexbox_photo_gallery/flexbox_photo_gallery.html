    <title>flexbox_photo_gallery</title>
    <style>
      h1 {
        text-align: center;
      }
      .gallery {
        background-color: lightblue;
        border: 4px solid black;
        width: 90%;
        max-width: 1280px;
        margin: auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }
      figure {
        background-color: white;
        width: 100%;
        max-width: 250px;
        padding: 1rem;
        margin: 1rem;
      }
      figcaption {
        text-align: center;
        color: #333;
        padding: 0.5rem;
      }
      img {
        width: 100%;
        aspect-ratio: 1 / 1;
      }
    </style>
  </head>
